---
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap permanently in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(\s*[^#]\S+\s+\S+\s+swap\s+\S+.*)$'
    replace: '# \1'

- name: Ensure required kernel modules are configured
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter

- name: Load required kernel modules now
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Ensure sysctl params for Kubernetes networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.ipv4.ip_forward                 = 1
      net.bridge.bridge-nf-call-ip6tables = 1

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Install containerd
  ansible.builtin.apt:
    update_cache: true
    name:
      - containerd
    state: present

- name: Ensure /etc/containerd exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Backup existing containerd config (if present)
  ansible.builtin.copy:
    remote_src: true
    src: /etc/containerd/config.toml
    dest: /etc/containerd/config.toml.bak
    mode: "0644"
  failed_when: false
  changed_when: false

- name: Generate default containerd config
  ansible.builtin.command: containerd config default
  register: containerd_default_config
  changed_when: false

- name: Write containerd config.toml from generated default
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    mode: "0644"
    content: "{{ containerd_default_config.stdout }}\n"

- name: Use systemd cgroup driver for containerd
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: '^(\s*)SystemdCgroup\s*=\s*false\s*$'
    replace: '\1SystemdCgroup = true'

- name: Configure crictl to use containerd
  ansible.builtin.copy:
    dest: /etc/crictl.yaml
    mode: "0644"
    content: |
      runtime-endpoint: unix:///run/containerd/containerd.sock
      image-endpoint: unix:///run/containerd/containerd.sock

- name: Enable and restart containerd
  block:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: restarted
  rescue:
    - name: Read containerd systemd status
      ansible.builtin.command: systemctl --no-pager -l status containerd
      register: containerd_status
      changed_when: false
      failed_when: false

    - name: Read recent containerd logs
      ansible.builtin.command: journalctl --no-pager -u containerd -n 200
      register: containerd_journal
      changed_when: false
      failed_when: false

    - name: Fail with containerd diagnostics
      ansible.builtin.fail:
        msg: |
          containerd failed to restart.

          systemctl status containerd:
          {{ containerd_status.stdout | default('') }}

          journalctl -u containerd (last 200 lines):
          {{ containerd_journal.stdout | default('') }}

- name: Install Kubernetes apt prereqs
  ansible.builtin.apt:
    update_cache: true
    name:
      - ca-certificates
      - curl
      - gpg
    state: present

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Kubernetes apt Release.key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version_minor }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-release.key
    mode: "0644"

- name: Create Kubernetes apt keyring (gpg --dearmor)
  ansible.builtin.command: >
    gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    /etc/apt/keyrings/kubernetes-apt-release.key
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Configure Kubernetes apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ k8s_version_minor }}/deb/ /

- name: Install kubelet, kubeadm, kubectl
  ansible.builtin.apt:
    update_cache: true
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

