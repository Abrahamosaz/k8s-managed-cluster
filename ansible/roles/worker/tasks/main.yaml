---
- name: Check if node already joined (kubelet.conf exists)
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Fail if there is no master in inventory
  ansible.builtin.assert:
    that:
      - groups['master_node'] | length > 0
    fail_msg: "Inventory must define at least one host in [master_node]."

- name: Get kubeadm join command from master
  ansible.builtin.command: kubeadm token create --print-join-command
  delegate_to: "{{ groups['master_node'][0] }}"
  become: true
  register: join_command
  changed_when: false
  when: not kubelet_conf.stat.exists

- name: Join the cluster
  ansible.builtin.command: "{{ join_command.stdout }}"
  when: not kubelet_conf.stat.exists
